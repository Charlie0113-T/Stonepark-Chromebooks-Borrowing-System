services:
  - type: web
    name: stonepark-chromebook-api
    runtime: node
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PGSSLMODE
        value: require
      - key: AUTH_BYPASS
        value: "false"
      - key: ALLOWED_EMAILS
        value: "chta0655@cloud.edu.pe.ca,dmdunn@cloud.edu.pe.ca"
      - key: ADMIN_USERS
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
