databases:
  - name: stonepark-db
    plan: free
    databaseName: stonepark_chromebook
    user: stonepark

services:
  - type: web
    name: stonepark-chromebook-api
    plan: free
    region: oregon
    runtime: node
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PGSSLMODE
        value: require
      - key: AUTH_BYPASS
        value: "false"
      - key: WHITELIST_SEED
        sync: false
      - key: ADMIN_USERS
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: stonepark-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_FROM
        sync: false
      - key: NOTIFY_TO
        sync: false

  - type: web
    name: stonepark-chromebook-frontend
    plan: free
    region: oregon
    runtime: static
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/build
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
